front:
  text: 黄庭内景五臟六腑補瀉圖并序國四
  hash: sha256:9a99ae5842c1e58551047c16babf829a7d4e80556e6e82bd217e98aa8d7db287
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0116_HFL_000-001a, image: hfl/0196/0196-050.png}
body:
  text: 太白山見素子胡憤述夫尺主陽食人以五氣地主隂食人以五味氣味相感結爲五臓五臟之氣散爲四肢十六部三百六十關節引爲筋脉津液血髓藴成六腑三膲十二經通爲九竅故五臟者爲人形之主一臟損則病生五臟損則神滅故五臟者神明魂魄志精之所居也毎臟各有所主是以心主神肺主魄肝主魂脾主意腎主志發於外則上應五星下應五獄皆模範天地禀象日月觸類而取不可勝言若能存神修養克已勵志其道成矣然後五臟堅強則内受腥腐諸毒不能侵外遭疾病諸氣不能損聰明純粹却老延年志髙神仙形無困疲日月精光來附我身四時六氣來合我體入夔化之道通神明之理把握隂陽呼吸精神造物者翻爲我所制至此之時不假金丹玉液琅玕大還自然神化冲虚氣合太和而升雲漢五臟之氣結五雲而入天中左召陽神六甲右呼隂神六丁千變萬化馭飛輪而適意是以不悟者勞苦外求實非知生之道是故大上曰精是吾神氣是吾道藏精養氣保守堅貞隂陽交會以立其形是也情風性不敏糿慕玄門鍊志無爲棲心澹泊覧黃庭之妙理窮碧簡之遺文焦心研精屢更歳月伏見舊圖與宻津路幽深詞理旣玄頣之者鮮指以色象或略記神名諸氏纂修異端斯起遂使後學之軰罕得其門差之亳釐謬逾千里今敢捜羅管見罄竭設肝按據諸經别爲圖式先明臟腑次説修行并引病源吐納除疾旁羅藥理導引屈伸察色尋證月禁食忌庶使後來學者披圖而六情可見開經而萬品昭然時大中二年戊辰戚述孫思邈論曰夫入禀天地而生故内有五臟六腑精氣骨髓筋脉外有四肢九竅皮毛爪齒喉咽脣舌肛門脬囊以此總而成軀故將息得理則百體安和役用非宜則爲五勞七傷六極有方可救雖病無他無法可憑奄然來往所以此圖之中皆備述五臓六腑血脉根源循環連注與九竅應會處所並窮於此其能留心考而行之則内外百痾無所逃矣夫髪宜多榔齒宜數叩液宜常嚥氣宜淸鍊手宜在面此五者所謂子欲不死修崑崙矣由是鋉丹以固之却粒以輕之去其土符書其金格朝天吸日馭氣冲盧此術士之用也元始太玄經云喜怒傷性哀樂傷神性損則害生神傷則侵命故養性以全氣保神以安心氣全則體平心安則神逸此全生之妙訣也肺臟圖治肺用呬呬爲瀉吸爲補肺金商也五臟之華蓋本一居上對胷有六紫色如縞映紅凡丈夫至八十肺氣衰魄離散也重三斤三兩西方白色入通於肺開竅於鼻在形爲皮毛肺脉出于少商肺者諸臓之長氣之本也是以諸氣屬之久臥傷氣天氣圓於肺蓋呼吸之精源爲傳送之官治又爲魄門上玉堂肺者相傳之官也治櫛岀馬於液爲涕涕者肺之津液腎邪入肺則多涕肺生於右肺爲喘咳六腑大腸爲肺之府大腸與肺合爲傳瀉行導之府五官鼻爲肺之官肺氣通則鼻知香臭肺病則鼻不知香臭肺合於皮其榮毛也皮聚而毛落者肺先死也爲西方兊金也金受氣於寅生於巳王於酉病於亥死於午墓於丑爲秋日爲庚辛辰爲申酉爲金聲商色白味辛其臭腥心邪入肺則惡腥也其性義其情怒肺之外應西嶽上通太白之精合於大腸上主於鼻故人之肺風者即鼻塞也人之容色枯者肺乾也人之鼻庠者肺有蟲也人之多怖者魄離於肺也人之體黧黯者肺氣微也人之多氣者肺盛也人之不耐寒者肺劳也人之好食辛味者肺不足也人之腸鳴者肺氣壅也人之顏色鮮白者肺無惡也肺邪自入則好哭夫肺主商也肺之有疾當用呬呬者肺之氣也其氣義能抽肺之疾所以人之有怨氣填塞胷臆者則長呬而洩之蓋自然之理也内若不呬必致傷敗賴呬而獲全乎故肺疾當用呬渴之夫人之無苦而呬者不祥也修養法常以秋三月朔望旭旦西面平坐鳴天鼓七飲玉泉三然後暝目正心思吸兊宮白氣入口七吞之閉氣七十息蓋所以調補神氣安息靈魄之所致也相肺臟病法肺病熱右頰赤肺病色曰而毛槁喘欬逆胷背及四肢煩疼或夢見美人乍來親近肺虚則少氣不能報息肺燥喉乾肺風則多汗畏風時欲欬如氣喘旦則善暮則甚肺病氣上逆急食苦以洩之又曰肺病欲收食酸以收之用辛補之苦瀉之禁食寒肺惡寒也肺有病鼻塞不通不聞香臭或有瘜肉或生瘡皮膚瘙痒惡瘡疥癬上氣欬嗽涕唾膿血冝服排風散方人參七分防風八分羌活八分沙參五分天雄八分薯蕷十分丹參七分苦參八分秦芃八分山茱茰八分玄參七分右搗篩爲末空腹以防風湯下三錢一七治肺六氣法吐納用呬法以鼻微長引氣以口呬之勿令耳聞皆先須調氣今和然後呬之肺有病用大呬三十徧細呬三十徧去肺家勞熱上氣欬嗽皮膚瘡庠四肢勞煩鼻塞胷背疼痛依法呬疾差止過度則捐月禁食忌法七月勿食茱萸食之血痢八月九月勿多食生薑并肝心肺之病宜食黍桃禁苦味肺臟導引法七月八月九月行之可正坐以兩手据地縮身曲脊向上三舉去肺家風邪積勞可反拳搥背上左右各三五度此去胷臆問風毒閉氣爲之畢良乆閉目三嚥液三叩齒而五心臟圖治心用呵呵爲瀉吸爲補心火宫也居肺下肝上對鳩尾下一寸色如縞映絳形如蓮花未開丈夫至六十心氣衰弱言多錯忘心重十二兩南方赤色入通於心開竅於耳在形爲脉心脉岀于中衝心者生之本神之處也且心爲諸臟之主主明運用生是以心臟神亦君主之官也亦曰靈臺心之爲噫雷氣通於心於液爲汗腎邪入心則多汗六腑小腸爲心之府小腸與心合爲受盛之府五官舌爲心之官心氣通則舌知五味心病則舌焦卷而短不知五味也心合於脉其榮色也心之合也血脉虛少而不能榮於臟腑者心先死也爲南方爲夏日爲丙丁辰爲巳午爲火聲微色赤咪苦其臭焦其性禮其情樂心之外應南嶽上通熒惑之精心合於小腸主其血脉上主於舌故人之心風者即舌縮不能語也人之血壅者心驚也舌不知味者心虚也多忘者心神雜也重語者心亂也多悲者心傷也好食苦味者心不足也面青黑者心冰也容色赤好者心無他惡也肺邪人心則多言夫心主徵心之有疾當用呵呵者心之氣其氣禮呵能静其心和其神所以人之昏亂者多呵蓋天然之氣也故心病當用呵瀉之也修養法常以四月五月弦清清旦面南端坐叩金梁九漱玉泉三静思以唿吸離宮赤氣入口三吞之閉氣三十息以楠呵之損相心臟病法心熱者色赤而脉溢心病者顏先赤口生瘡腐爛心胷肩脇兩肋背兩鼻臂皆痛或夜夢赤衣人持赤刀仗火來怖之人心虛則胷腹腰相引而痛又云心病欲濡急食鹹以濡之用苦以補之甘以瀉之禁濕衣熱食心惡熱及水心病證當臍上有動氣按之牢若痛昔煩心病手足心熱啘心有病口乾舌強咽喉口痛嚥食不得口內生瘡忘前失後夢見爐治之類宜服五參丸泰芁七分人參七分丹參七分玄參十分乾薑十分沙參五分酸棗仁八分苦參粉八分右搗篩宻和丸如梧桐子空腹人參湯下二十九日再服六氣法治心臟用呵法以鼻漸長引氣以口呵之皆調氣如上勿令自耳聞之然後呵之心有病用大呵三偏細呵十偏去心家勞熱一切煩悶疾差止過度損月食禁忌法四月勿食大蒜令人髮易白及墮五月勿食韭損心氣及有毒并勿食心腎心痛宜食大小麥杏蘆禁鹹食心臟導引法四月五月行之可正坐两手作拳用力左右五築各五六度又可正坐以一手向上拓空如拓重石又以雨手急相又以脚踏手中各五六度然去心胷間風邪諸疾閉氣爲之畢良久閉目三嚥液三叩齒而止肝臓圓治肝用墟爲瀉吸爲補肝木宫也居左下少近心左三葉右四葉色如縞映紺凡丈夫至六十肝氣衰肝葉薄瞻漸減目不明也重四斤四雨東方青色入通於肝開竅於目在形爲䈥肝脉出于木肝色青翠大小相重之象也肝者罷極之本魂之處也於液爲淚淚者肝之液也腎邪入肝故争淚六腑膽爲肝之府膽與肝合也五官眼者肝之官肝氣通則分五色肝實則目赤黃也肝合於脉其榮爪也肝之合也筋緩脉而不能自持者肝先死也爲東方爲春日爲甲乙辰爲寅卯爲本聲角色青味酸其臭臊心邪入肝則惡臊肝之外應東嶽上通歳星之精春三月存歳星在肝中亦作青氣存之肝合腠上主於自又主筋故人之肝虛者筋急也皮枯者肝熱也肌肉斑黯者肝風也人之色青者肝盛也人好食酸味者肝不足也人之髮枯肝傷也人之手足多汗者肝無疾也肺邪入肝則多笑夫肝主筋肝之有疾當用嘘墟者肝之氣其氣仁能除毁痛皆自然之理也修養法以春三月朔旦東面平坐叩齒三通閉氣九息吸震宫青氣入口九吞之以補嘘之損享青龍之杞相肝臓病法肝熱者左頰赤肝病者目奪而脇下痛引小腹令人喜怒肝虛則恐如人將捕之實則怒虚則寒寒則隂氣壯夢見山樹園林肝氣逆則頭痛耳聾頰腫又曰肝病欲散急食辛以散之用酸補之辛瀉之禁當風肝惡風也肝病臍在有動氣按之牢苦痛支滿淋溲大小便難好轉筋肝有病昏昏饒睡眼膜視物不明飛蠅上下努肉浸睛或生暈映冷淚下兩角赤痒冝服升麻散升麻八分黄苓八分茺蔚子八分梔子十分決明子十分車前子十分乾薑十分昔瓠五分龍膽五分右擣篩爲末食上煖槳水下方寸七日再服六氣法治肝臓用嘘法以鼻漸長引氣以口嘘之肝病用大嘘三十徧細墟十徧自然去肝家虚熱亦除四肢壯熱眼闇一切煩熱等數墟之綿綿相次不絶爲妙疾差止過度則損月食禁忌法正月不食生葱熟者不食益佳二月三月不食蓼子小蒜及百草心勿食肝肺肝病宜食麻子豆李子禁辛肝臓導引法正月二月三月行之可正坐以兩手相重按臂上徐徐緩綟身左右各三五度又可正坐雨手相又翻覆向胷三五度此能去肝家積聚風邪毒氣脾贜圖治脾用呼呼爲瀉吸爲補脾上宫也掩大倉上在臍上三寸色縞映黄凡丈夫至七十脾氣虚兩皮膚枯痩也重二斤二兩中央黄色入通於脾開竅於口在形爲頰脾脉岀干隱白脾爲五臟之樞也脾者肉之本意之處也穀氣通於脾於液爲涎腎邪入脾則多涎六腑胃爲脾之府胃與脾合爲五穀之府五官口爲脾之官脾氣通則口知五味脾病則口乾不能食不知五味也脾合於肉其榮脣也夫肌肉消痩者脾先死也爲中央爲季夏日爲戊巳辰爲展未戌丑爲土聲宫色黃味甘其臭香心邪入脾則惡香也脾之外應中獄上通鎮星之精季夏并四季各十八日存鎭星在脾中亦作黄氣存之脾連於胃上主於口消榖府也如磨轉之化其生而入於熟者也食不消脾不轉也食堅物者脾磨不化也則爲食患故諸臟不調則傷脾脾臟不調則傷質質神俱傷則傷人之速也故人不欲食堅物者全身之道也人之不欲食者脾中有不化之食人之多惑者脾不安人之多食者脾實也人之食不下者脾虚也人之無顏色者脾傷也人之好食甘味者脾不足也人之肌肉鮮白滑者脾無疾也肺邪入脾則多歌夫脾主宮故脾之有疾當用呼呻者脾之氣其氣信能抽脾之疾故人中熱者則呼以驅其弊也修飬法常以季夏之月朔旦并四季之末十八日之旭旦正坐中宫禁氣五息鳴天鼓十二通吸坤宫之黃氣入口十二吞之以補呼之損相脾臓病法脾熱者鼻色赤黄而肉臑脾病體上遊風瘤之徧體悶疼身重喜飢肉痿足不能行喜聲脚下痛脾虚則腹肚脹鳴成溏痢食多不化脾風之狀多汗惡風身體息惰四肢不收微黄不嗜飲食診在鼻其色黃脾惡濕食苦以燥之又曰脾病欲緩急食甘即補之苦即瀉之禁濕脾惡濕也脾病當臍有動氣按之牢若痛苦逆氣小腸急痛洩下足重脛寒脾有病两脇脹滿飲食不消時時嘔逆不能下食背膊沈重氣滿衝心四肢虚腫冝服訶梨勒九乾地黃十分牡丹皮十分薯蕷八分澤瀉八分茯苓八分芎藭八分山茱萸九分華撥四分乾薑五分訶梨勒皮七分右擣篩宻和丸如梧桐子空腹地黃湯下二十九六氣法治脾臟吐納用呼法以鼻漸長引氣以口呼之脾病用大呻三十徧細呼十徧能去脾家一切泠氣壮熱霍亂宿食下消偏風痳痺脾內結塊數數呼之相次勿絕疾退即止過度則損月食禁忌法六月勿食茱萸令人患赤白痢四季勿食脾肝羊血脾病冝食粳米棗葵禁酸味脾臟導引法六月并四季行之可大伸一脚以两手向後反掣各三五度亦可跪坐以两手拒地廻顧用力虎視各三五度能去脾臟積聚風邪毒氣腎臟圖治腎用吹吹爲瀉吸爲補腎水宫也左腎右命門前對臍博著腰脊色如縞映紫凡丈夫至六十腎氣衰髪隨齒槀七十形體皆極九十腎氣焦枯經脉空虛人之有腎如樹之有根重一斤二兩北方黒色入通於腎開竅於二隂在形爲骨故久立即傷骨損賢腎脉出干涌泉腎者封藏之本精之處也腎經於上膲榮於中膲衞於下膲腎爲之呻亦爲欠兩凡一於腎於液爲腄腎邪自入則多唾六腑膀胱爲腎之府膀胱與腎合爲津液之府五官耳者賢之官故腎氣通則耳聞五音腎病則耳聾骨痿腎合於骨其榮髭也腎之合也骨痿而不能起牀者腎先死也爲北方爲冬日爲壬癸辰爲亥子爲水聲羽色黒味鹹其臭腐心邪入腎則惡腐也腎之外應北嶽上通辰星之精冬三月存辰星在腎中亦作黒氣存之腎合於骨上主於齒齒之痛者腎傷也又主於耳耳不聞聲者腎虧也人之骨疼者腎虚也人之齒多齟者腎虚也人之齒隨者腎風也人之耳痛者腎氣壅也人之多欠者賢邪也人之腰不伸者腎乏也人之色黑者腎衰也人之容色紫光者腎無苦也人骨鳴者腎贏也肺邪入腎則多呻夫腎主羽故腎之有疾當用吹吹者腎之氣其氣智能抽腎之疾故人有積氣衝臆者則強吹也腎氣沈滯重吹則漸通也修養法常以冬三月面北向平坐鳴金梁七飲玉泉三北吸玄官之黑氣入口五吞之以補吹之損相腎臟病法腎熱者頥赤腎病者色黑而齒槁腹大體重喘咳汗岀惡風腎虛則腰中痛腎風之狀頸多汗惡風食欲下膈塞不通腹喜滿失衣則腹脹食寒則洩診在形黑痩而腹大腎若燥急食辛以潤之又曰腎病欲堅急食鹹以堅之用苦以瀉之鹹以補之禁無犯熱食溫衣腎惡燥也腎病臍下有動氣按之牢若痛苦腹滿食不消體重骨節疼嗜臥腎有病腰胯膀胱泠痛脚冷疼或痺小便餘瀝疝瘕所纒冝服腎氣丸乾地黄十分薯蕷十分牡丹皮七分澤瀉八分山萊萸九分茯苓六分桂心六分附子四分右擣篩宻九如梧桐子大空腹酒下三十丸日再服六氣法治腎臟吐納用吹法以鼻漸長引氣以口吹之腎病用大吹三十徧細吹十徧能除腎家一刼冷腰疼膝冷腰脚沈重久立不得陽道衰弱耳中蟲鳴及口中有瘡是腎家諸疾諸煩𤍠悉皆去之數數吹之相次勿絶疾差則止過度則損月食禁忌法十月勿食椒令人口乾成赤白痢十一月十二月勿食鱗甲之物并食腎脾腎病冝食大豆黄卷藿禁甘物腎臟導引法冬三月行之可正坐以兩手聳拓石引脇三五度亦可手著膝挽肘左右同綟身三五度亦可以足前後踏左右各數十度能去腰腎膀胱間風邪積聚右巳上五臟數加膽名六腑亦受水氣與坎同道不可同例叙之故别膽府圖相次之膽腑圖治膽用嘻嘻爲瀉吸爲補膽博著肝色如縞映青重三兩三銖膽合乎膀胱上主於毛髪故人之髪枯者膽竭也人之爪乾者膽虧也人之髮燥毛焦者膽有風也人好食苦味者膽不足也人之顏色青光白者膽無疾也修養法常以冬三月端居淨思北吸玄宫之黑氣入口三吞之以補嘻之損用益膽之津相膽腑病法膽之有病大息口苦嘔宿汁心中恐人將捕之膽若實則精神不守臥起無定若虚則傷寒寒則恐畏頭眩虚損則爪髪枯燥目中淚出膀胱連腰小腹俱痛膽與肝合道有病與肝藏方膽腑導引法可正坐合兩脚掌昂頭以兩手挽脚腕起揺動爲之三五度亦可大坐以兩手拓地舉身努腰脊三五度能去膽家風毒邪氣治膽腑吐納用嘻法以鼻漸長引氣以口嘻之去膽家病并除隂臓一切泠隂汗盜汗面無顏色小腸脹滿臍下泠痛口乾舌澁數嘻之疾乃愈右五臟六腑圖取其要者略之故文不足尋者數之肺呬心呵肝嘘脾呼腎吹膽嘻右此六字六腑之氣非神名人用冝知之但爲除疾非胎息也釋音臑奴到切折脊脅也欬音孩笑也瘕音加病也齟才與切黄庭內景五臓六腑補瀉圖
